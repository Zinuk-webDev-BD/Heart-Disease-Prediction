<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Heart Disease Prediction</title>

  <link rel="stylesheet" href="style.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>

<body>

  <button class="theme-toggle" id="themeBtn">
    <i class="fa-solid fa-moon"></i>
  </button>

  <div class="container">

    <div class="top">
      <i class="fa-solid fa-heart-pulse heart-icon"></i>

      <h1>Heart Disease Prediction</h1>

      <p>
        Enter patient information to check heart disease risk prediction
      </p>
    </div>

    <form id="heartForm">

      <div class="input-box">
        <i class="fa-solid fa-user"></i>
        <input type="number" id="age" placeholder="Age" required>
      </div>

      <div class="input-box">
        <i class="fa-solid fa-heart-circle-bolt"></i>
        <input type="number" id="bp" placeholder="Resting BP" required>
      </div>

      <div class="input-box">
        <i class="fa-solid fa-droplet"></i>
        <input type="number" id="cholesterol" placeholder="Cholesterol" required>
      </div>

      <div class="input-box">
        <i class="fa-solid fa-wave-square"></i>
        <input type="number" id="maxHr" placeholder="Max Heart Rate" required>
      </div>

      <div class="input-box">
        <i class="fa-solid fa-chart-line"></i>
        <input type="number" step="0.1" id="oldpeak" placeholder="Oldpeak" required>
      </div>

      <div class="input-box">
        <i class="fa-solid fa-candy-cane"></i>
        <input type="number" id="fbs" placeholder="Fasting Blood Sugar (0/1)" required>
      </div>

      <div class="input-box">
        <i class="fa-solid fa-stethoscope"></i>
        <input type="number" id="cp" placeholder="Chest Pain Type (0-3)" required>
      </div>

      <div class="input-box">
        <i class="fa-solid fa-person-running"></i>
        <input type="number" id="exang" placeholder="Exercise Angina (0/1)" required>
      </div>

      <button type="submit">
        Predict Now
      </button>

    </form>

    <div class="result" id="result">
      Result will appear here...
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
